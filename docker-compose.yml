version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proptech-db
    environment:
      POSTGRES_DB: proptech
      POSTGRES_USER: ${DATABASE_USER:-proptech}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptech"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proptech-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proptech-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/proptech
      DATABASE_USER: ${DATABASE_USER:-proptech}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proptech-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proptech-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - proptech-network
    restart: unless-stopped

volumes:
  postgres_data:
    name: proptech_postgres_data
  uploads_data:
    name: proptech_uploads_data

networks:
  proptech-network:
    name: proptech-network
    driver: bridge
