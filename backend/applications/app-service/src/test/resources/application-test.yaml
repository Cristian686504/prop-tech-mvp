server:
  port: 0  # Random port for tests

spring:
  application:
    name: proptech-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop  # Auto create/drop schema for tests
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false  # Disable Flyway for tests, use JPA auto DDL

jwt:
  secret: "test-secret-key-for-testing-only-must-be-at-least-256-bits-long-for-HS384-algorithm"
  expiration: 86400000

logging:
  level:
    co.com.proptech: DEBUG
    org.springframework.security: WARN
    org.hibernate: WARN
