server:
  port: 8080
spring:
  application:
    name: proptech
  devtools:
    add-properties: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/proptech}
    username: ${DATABASE_USER:proptech}
    password: ${DATABASE_PASSWORD:proptech}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: "validate"
    show-sql: false
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.PostgreSQLDialect"
        format_sql: true
    databasePlatform: "org.hibernate.dialect.H2Dialect"
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: "classpath:db/migration"
  profiles:
    include: null
jwt:
  secret: "${JWT_SECRET}"
  expiration: 86400000
