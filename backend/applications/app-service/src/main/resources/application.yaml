server:
  port: 8080
spring:
  application:
    name: proptech
  devtools:
    add-properties: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/proptech}
    username: ${DATABASE_USER:proptech}
    password: ${DATABASE_PASSWORD:proptech}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  profiles:
    include: null
jwt:
  secret: "${JWT_SECRET}"
  expiration: 86400000

logging:
  level:
    co.com.proptech: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
