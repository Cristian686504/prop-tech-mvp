name: PropTech MVP - CI/CD Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  POSTGRES_DB: proptech_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

jobs:
  # ========================================
  # Backend - Build and Test
  # ========================================
  backend-tests:
    name: Backend - Unit Tests & Coverage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔧 Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: 🧪 Run unit tests
        working-directory: ./backend
        run: ./gradlew test --no-daemon

      - name: 📊 Generate coverage report
        working-directory: ./backend
        run: ./gradlew jacocoTestReport --no-daemon

      - name: 📈 Verify coverage threshold
        working-directory: ./backend
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./backend/**/build/reports/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: 📋 Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        continue-on-error: true
        if: always()
        with:
          files: |
            backend/**/build/test-results/**/*.xml

      - name: 📂 Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: |
            backend/**/build/reports/jacocoHtml/
            backend/**/build/reports/jacoco.xml
          if-no-files-found: warn

  # ========================================
  # Backend - Build
  # ========================================
  backend-build:
    name: Backend - Build Application
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔧 Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: 🏗️ Build application
        working-directory: ./backend
        run: ./gradlew build -x test --no-daemon

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/applications/app-service/build/libs/*.jar
          retention-days: 7

  # ========================================
  # Frontend - Lint and Build
  # ========================================
  frontend-lint:
    name: Frontend - Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: ./frontend
        run: npm run lint

  frontend-build:
    name: Frontend - Build Application
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🏗️ Build application
        working-directory: ./frontend
        run: npm run build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ========================================
  # Docker - Build Images
  # ========================================
  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: 🏗️ Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: proptech-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: proptech-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Integration - Full Stack Test
  # ========================================
  integration-test:
    name: Integration - Docker Compose Test
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Start services with Docker Compose
        run: docker compose up -d

      - name: ⏳ Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -f http://localhost:8080/actuator/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: 🧪 Run smoke tests
        run: |
          # Test backend health
          curl -f http://localhost:8080/actuator/health || exit 1
          # Test frontend
          curl -f http://localhost:3000 || exit 1

      - name: 📋 Show logs on failure
        if: failure()
        run: docker compose logs

      - name: 🛑 Tear down services
        if: always()
        run: docker compose down -v

  # ========================================
  # Code Quality
  # ========================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔍 SonarCloud Scan (Optional)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: ./backend
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            chmod +x gradlew
            ./gradlew sonar --no-daemon
          else
            echo "⚠️ SONAR_TOKEN not set, skipping SonarCloud analysis"
          fi
        continue-on-error: true

  # ========================================
  # Summary
  # ========================================
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-build, frontend-build, code-quality]
    if: always()
    
    steps:
      - name: ✅ All checks passed
        if: needs.backend-tests.result == 'success' && needs.backend-build.result == 'success' && needs.frontend-build.result == 'success'
        run: |
          echo "🎉 All pipeline checks passed successfully!"
          echo "✅ Backend tests: PASSED"
          echo "✅ Backend build: PASSED"
          echo "✅ Frontend build: PASSED"
          
      - name: ❌ Some checks failed
        if: needs.backend-tests.result != 'success' || needs.backend-build.result != 'success' || needs.frontend-build.result != 'success'
        run: |
          echo "❌ Pipeline failed. Check the logs above."
          exit 1
